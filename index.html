<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <!-- iOS PWA: hides Safari chrome, launches full-screen from home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Feitos Mimosos">
  <!-- Prevent auto-zoom on input focus (requires font-size >= 16px on inputs) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Feitos Mimosos — Paragens</title>

  <style>
    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --card:      #232323;
      --card2:     #2a2a2a;
      --accent:    #FFD700;
      --accent-dim:#A38900;
      --text:      #FFFFFF;
      --text2:     #BBBBBB;
      --text3:     #777777;
      --danger:    #FF5555;
      --ok:        #55FF99;
      --border:    #333333;
      --touch:     56px;   /* iOS minimum tap target */
      --radius:    14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 17px;
      line-height: 1.45;
      /* Smooth scrolling on iOS */
      -webkit-overflow-scrolling: touch;
    }

    /* ── LOGIN ────────────────────────────────────────── */
    #login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 40px 28px;
      padding-top: max(40px, env(safe-area-inset-top));
      gap: 32px;
    }

    .brand { text-align: center; }
    .brand-name {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .brand-sub {
      font-size: 15px;
      color: var(--text2);
      margin-top: 4px;
    }

    .login-form {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-wrap { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input[type="email"],
    input[type="password"] {
      height: var(--touch);
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 17px; /* ≥16px prevents iOS auto-zoom */
      padding: 0 18px;
      outline: none;
      width: 100%;
      transition: border-color 0.18s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      height: 62px;
      border: none;
      border-radius: var(--radius);
      font-size: 19px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      -webkit-appearance: none;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #000; width: 100%; margin-top: 6px; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .login-err {
      min-height: 22px;
      color: var(--danger);
      font-size: 15px;
      text-align: center;
    }

    /* ── APP SHELL ────────────────────────────────────── */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
    }

    /* ── HEADER ───────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 14px;
      padding-top: max(14px, env(safe-area-inset-top));
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      min-height: 36px;
    }
    .logout-btn:active { color: var(--text); border-color: var(--text2); }

    /* ── DATE NAV ─────────────────────────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .day-btn {
      width: var(--touch);
      height: var(--touch);
      flex-shrink: 0;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
      -webkit-appearance: none;
    }
    .day-btn:active { background: var(--accent); border-color: var(--accent); color: #000; }
    .day-btn:disabled { opacity: 0.3; cursor: default; }

    /* Date display — wraps a transparent <input type="date"> overlay */
    .date-center {
      flex: 1;
      position: relative;
      height: var(--touch);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
    }
    .date-center:active { border-color: var(--accent); }

    .date-text {
      text-align: center;
      pointer-events: none;
    }
    .date-main {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .date-full {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* Invisible date input floated over the whole date-center area */
    #date-picker {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      font-size: 17px;
      -webkit-appearance: none;
      border: none;
      background: none;
    }

    /* ── SCROLL BODY ──────────────────────────────────── */
    .stops-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── SUMMARY BAR ──────────────────────────────────── */
    .summary {
      font-size: 13px;
      color: var(--text2);
      padding: 2px 2px;
    }

    /* ── STOP CARD ────────────────────────────────────── */
    .stop-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stop-card-top {
      padding: 14px 16px 12px;
    }

    .stop-vehicle {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .stop-address {
      font-size: 15px;
      color: var(--text);
      line-height: 1.35;
    }
    .stop-address.loading { color: var(--text3); font-style: italic; }

    /* Three-column time row */
    .stop-times {
      display: flex;
      align-items: stretch;
      border-top: 1px solid var(--border);
    }

    .time-col {
      flex: 1;
      padding: 11px 10px;
      text-align: center;
    }
    .time-col + .time-col { border-left: 1px solid var(--border); }

    .tc-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      margin-bottom: 5px;
    }
    .tc-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .tc-value.accent { color: var(--accent); font-size: 18px; }
    .tc-value.live {
      color: var(--ok);
      font-size: 15px;
      font-weight: 700;
    }

    /* ── LOADING / EMPTY / ERROR ─────────────────────── */
    .center-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      text-align: center;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-icon { font-size: 46px; }
    .msg-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .msg-sub { font-size: 14px; color: var(--text2); }
    .msg-err { color: var(--danger); font-size: 14px; }

    .retry-btn {
      margin-top: 8px;
      padding: 14px 32px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      min-height: var(--touch);
    }
  </style>
</head>
<body>

<!-- ────────────────── LOGIN SCREEN ────────────────── -->
<div id="login">
  <div class="brand">
    <div class="brand-name">Feitos Mimosos</div>
    <div class="brand-sub">Histórico de Paragens</div>
  </div>

  <form class="login-form" id="login-form" onsubmit="handleLogin(event)" novalidate>
    <div class="field-wrap">
      <label class="field-label" for="inp-email">Email</label>
      <input type="email" id="inp-email" autocomplete="username"
             placeholder="email@exemplo.pt" inputmode="email" required>
    </div>
    <div class="field-wrap">
      <label class="field-label" for="inp-pass">Palavra-passe</label>
      <input type="password" id="inp-pass" autocomplete="current-password"
             placeholder="••••••••" required>
    </div>

    <div class="login-err" id="login-err" role="alert" aria-live="polite"></div>

    <button type="submit" class="btn btn-primary" id="login-btn">Entrar</button>
  </form>
</div>

<!-- ────────────────── APP SCREEN ──────────────────── -->
<div id="app">

  <div class="header">
    <div class="header-row1">
      <div class="header-title">Feitos Mimosos</div>
      <button class="logout-btn" onclick="handleLogout()">Sair</button>
    </div>

    <div class="date-nav" role="navigation" aria-label="Seleção de data">
      <button class="day-btn" id="prev-btn"
              onclick="shiftDate(-1)" aria-label="Dia anterior">‹</button>

      <div class="date-center" role="button" aria-label="Abrir seletor de data">
        <div class="date-text">
          <div class="date-main" id="date-main">Hoje</div>
          <div class="date-full" id="date-full"></div>
        </div>
        <!-- Transparent date input overlaid on date-center; native iOS picker on tap -->
        <input type="date" id="date-picker" aria-label="Selecionar data"
               onchange="handlePickerChange(this.value)">
      </div>

      <button class="day-btn" id="next-btn"
              onclick="shiftDate(1)" aria-label="Próximo dia">›</button>
    </div>
  </div>

  <div class="stops-body" id="stops-body">
    <div class="center-msg">
      <div class="spinner"></div>
      <div class="msg-sub">A carregar...</div>
    </div>
  </div>

</div>

<script>
'use strict';

// ── CONFIG ─────────────────────────────────────────────────────────────────
const DB       = 'feit02';
const SESS_KEY = 'fm_sess_v2';
const ADDR_KEY = 'fm_addr_v2';
const API_BASE = 'my.geotab.com'; // overridden by auth response path

// ── STATE ──────────────────────────────────────────────────────────────────
let sess     = null;   // {userName, sessionId, database, server}
let selDate  = today();
let addrMap  = {};     // "x,y" → formatted address string

// ── BOOTSTRAP ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  try { addrMap = JSON.parse(localStorage.getItem(ADDR_KEY) || '{}'); } catch(_) {}

  const raw = localStorage.getItem(SESS_KEY);
  if (raw) {
    try {
      sess = JSON.parse(raw);
      showApp();
      await loadStops();
      return;
    } catch(_) { sess = null; }
  }
  showLogin();
});

// ── AUTH ────────────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');

  btn.textContent = 'A entrar...';
  btn.disabled = true;
  err.textContent = '';

  try {
    const res = await rawCall(API_BASE, 'Authenticate', {
      userName: email, password: pass, database: DB
    });
    sess = {
      userName:  res.credentials.userName,
      sessionId: res.credentials.sessionId,
      database:  res.credentials.database,
      server:    res.path || API_BASE
    };
    localStorage.setItem(SESS_KEY, JSON.stringify(sess));
    showApp();
    await loadStops();
  } catch(ex) {
    err.textContent = 'Email ou palavra-passe incorretos. Tente novamente.';
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

function handleLogout() {
  localStorage.removeItem(SESS_KEY);
  sess = null;
  document.getElementById('inp-email').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-btn').textContent = 'Entrar';
  document.getElementById('login-btn').disabled = false;
  showLogin();
}

// ── SCREEN SWITCHING ────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display   = 'none';
}
function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  renderDateHeader();
}

// ── DATE NAV ────────────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function shiftDate(delta) {
  const d = new Date(selDate);
  d.setDate(d.getDate() + delta);
  if (d > today()) return;          // no future
  selDate = d;
  renderDateHeader();
  loadStops();
}

function handlePickerChange(val) {
  if (!val) return;
  const [y,m,dd] = val.split('-').map(Number);
  const d = new Date(y, m-1, dd);
  if (d > today()) return;
  selDate = d;
  renderDateHeader();
  loadStops();
}

function renderDateHeader() {
  const t   = today();
  const yest = new Date(t); yest.setDate(t.getDate() - 1);
  let label;
  if (sameDay(selDate, t))    label = 'Hoje';
  else if (sameDay(selDate, yest)) label = 'Ontem';
  else label = selDate.toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'});

  document.getElementById('date-main').textContent = label;
  document.getElementById('date-full').textContent =
    selDate.toLocaleDateString('pt-PT', {weekday:'long', day:'2-digit', month:'long'});

  document.getElementById('date-picker').value = isoDate(selDate);
  document.getElementById('next-btn').disabled = sameDay(selDate, t);
}

// ── STOPS LOADER ─────────────────────────────────────────────────────────────
async function loadStops() {
  const body = document.getElementById('stops-body');
  body.innerHTML = `<div class="center-msg"><div class="spinner"></div><div class="msg-sub">A carregar paragens...</div></div>`;

  try {
    const fromDate = localMidnight(selDate).toISOString();
    const toDate   = new Date(localMidnight(selDate).getTime() + 86400000 - 1).toISOString();

    // Fetch devices and trips in parallel
    const [devices, trips] = await Promise.all([
      apiGet('Device', {}),
      apiCall('Get', { typeName: 'Trip', search: { fromDate, toDate }, resultsLimit: 50000 })
    ]);

    // Build device lookup
    const devMap = {};
    (devices || []).forEach(d => { devMap[d.id] = d; });

    // Keep completed stops (≥60s) AND currently-active stops (stopDuration null/0 = vehicle still there)
    const stops = (trips || []).filter(t => {
      const sec = toSec(t.stopDuration);
      return !t.stopDuration || sec === 0 || sec >= 60;
    });

    if (!stops.length) {
      const dateStr = selDate.toLocaleDateString('pt-PT', {day:'2-digit', month:'long'});
      body.innerHTML = `
        <div class="center-msg">
          <div class="msg-icon">🅿️</div>
          <div class="msg-title">Sem paragens</div>
          <div class="msg-sub">Nenhuma paragem registada para ${dateStr}</div>
        </div>`;
      return;
    }

    // Sort: most recent arrival first
    stops.sort((a, b) => new Date(b.stop) - new Date(a.stop));

    // Collect coordinates needing address resolution
    const needAddr = stops
      .filter(t => t.stopPoint?.x != null && !addrMap[coordKey(t.stopPoint)])
      .map(t => ({ x: t.stopPoint.x, y: t.stopPoint.y }));

    if (needAddr.length) {
      try {
        const addrs = await apiCall('GetAddresses', { coordinates: needAddr });
        (addrs || []).forEach((a, i) => {
          const key = `${needAddr[i].x.toFixed(5)},${needAddr[i].y.toFixed(5)}`;
          addrMap[key] = (a?.formattedAddress) || null;
        });
        localStorage.setItem(ADDR_KEY, JSON.stringify(addrMap));
      } catch(_) { /* addresses best-effort */ }
    }

    // Render
    const fragment = document.createDocumentFragment();

    const summary = document.createElement('div');
    summary.className = 'summary';
    summary.setAttribute('role','status');
    summary.textContent = `${stops.length} paragem${stops.length !== 1 ? 's' : ''} · ${
      selDate.toLocaleDateString('pt-PT', {weekday:'long', day:'2-digit', month:'long'})}`;
    fragment.appendChild(summary);

    stops.forEach(trip => {
      const dev     = devMap[trip.device?.id] || {};
      const vName   = dev.name || '—';
      const stopped = new Date(trip.stop);
      const durSec  = toSec(trip.stopDuration);
      const isLive  = !trip.stopDuration || durSec === 0;  // still stopped
      const depart  = isLive ? null : new Date(stopped.getTime() + durSec * 1000);
      const addr    = resolveAddr(trip.stopPoint);

      const card = document.createElement('div');
      card.className = 'stop-card';
      card.setAttribute('role','article');
      card.setAttribute('aria-label',
        `${vName}, ${addr}, chegada ${fmtTime(stopped)}, ${isLive ? 'em paragem' : 'saída ' + fmtTime(depart)}`);

      card.innerHTML = `
        <div class="stop-card-top">
          <div class="stop-vehicle">${esc(vName)}</div>
          <div class="stop-address">${esc(addr)}</div>
        </div>
        <div class="stop-times" role="group" aria-label="Horários">
          <div class="time-col">
            <div class="tc-label">Chegada</div>
            <div class="tc-value">${fmtTime(stopped)}</div>
          </div>
          <div class="time-col">
            <div class="tc-label">Duração</div>
            <div class="tc-value ${isLive ? 'live' : 'accent'}">${isLive ? 'Em paragem' : fmtDur(durSec)}</div>
          </div>
          <div class="time-col">
            <div class="tc-label">Saída</div>
            <div class="tc-value">${depart ? fmtTime(depart) : '—'}</div>
          </div>
        </div>`;
      fragment.appendChild(card);
    });

    body.innerHTML = '';
    body.appendChild(fragment);

  } catch(ex) {
    // Session expired → back to login
    if (/InvalidUserException|NotAuthorizedException|DbUnavailable/i.test(ex.message || '')) {
      localStorage.removeItem(SESS_KEY);
      sess = null;
      showLogin();
      document.getElementById('login-err').textContent = 'Sessão expirada. Inicie sessão novamente.';
      return;
    }
    body.innerHTML = `
      <div class="center-msg">
        <div class="msg-icon">⚠️</div>
        <div class="msg-title">Erro ao carregar</div>
        <div class="msg-err">${esc(ex.message || 'Erro desconhecido')}</div>
        <button class="retry-btn" onclick="loadStops()">Tentar novamente</button>
      </div>`;
  }
}

// ── GEOTAB API ──────────────────────────────────────────────────────────────
async function rawCall(server, method, params) {
  const r = await fetch(`https://${server}/apiv1`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method, params, id: 1 })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  return d.result;
}

function apiCall(method, params) {
  return rawCall(sess.server, method, {
    ...params,
    credentials: {
      userName:  sess.userName,
      sessionId: sess.sessionId,
      database:  sess.database
    }
  });
}

function apiGet(typeName, search) {
  return apiCall('Get', { typeName, search });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
// Parse Geotab .NET TimeSpan: "d.HH:MM:SS" or "HH:MM:SS" or number (seconds)
function toSec(v) {
  if (!v) return 0;
  if (typeof v === 'number') return Math.max(0, v);
  const m = String(v).match(/^(?:(\d+)\.)?(\d+):(\d+):(\d+(?:\.\d+)?)/);
  if (!m) return 0;
  return Math.max(0,
    (parseInt(m[1]||0)) * 86400 +
    parseInt(m[2]) * 3600 +
    parseInt(m[3]) * 60 +
    parseFloat(m[4])
  );
}

function fmtDur(sec) {
  if (sec < 60) return `${Math.round(sec)}s`;
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function fmtTime(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
}

function coordKey(c) {
  if (!c || c.x == null) return '';
  return `${c.x.toFixed(5)},${c.y.toFixed(5)}`;
}

function resolveAddr(pt) {
  if (!pt || pt.x == null) return 'Localização não disponível';
  const addr = addrMap[coordKey(pt)];
  if (addr) return addr;
  return `${pt.y?.toFixed(5)}, ${pt.x?.toFixed(5)}`;
}

function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function localMidnight(d) {
  const m = new Date(d); m.setHours(0,0,0,0); return m;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
